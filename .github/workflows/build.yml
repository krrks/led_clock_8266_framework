name: Build & Release Firmware

# ════════════════════════════════════════════════════════════════════
# Trigger conditions
# ════════════════════════════════════════════════════════════════════
on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if no changes'
        required: false
        default: false
        type: boolean

# ════════════════════════════════════════════════════════════════════
# Job 1: Pre-flight Check
# ════════════════════════════════════════════════════════════════════
jobs:
  check:
    name: Pre-flight Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      patch_found:      ${{ steps.find_patch.outputs.patch_found }}
      patch_path:       ${{ steps.find_patch.outputs.patch_path }}
      should_apply:     ${{ steps.decision.outputs.should_apply }}
      compile_firmware: ${{ steps.decision.outputs.compile_firmware }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find latest patch zip
        id: find_patch
        run: |
          ZIP=$(find zip_update/patches -maxdepth 1 -name 'update_*.zip' 2>/dev/null \
                | sort -t_ -k2 -n | tail -n1 || echo "")
          if [ -n "$ZIP" ]; then
            echo "patch_found=true"  >> "$GITHUB_OUTPUT"
            echo "patch_path=$ZIP"   >> "$GITHUB_OUTPUT"
            echo "✅ Found patch: $ZIP"
          else
            echo "patch_found=false" >> "$GITHUB_OUTPUT"
            echo "patch_path="       >> "$GITHUB_OUTPUT"
            echo "ℹ️  No patch found — building current code"
          fi

      - name: Decide actions
        id: decision
        run: |
          PATCH="${{ steps.find_patch.outputs.patch_found }}"
          FORCE="${{ github.event.inputs.force_build }}"
          if [ "$PATCH" = "true" ]; then
            echo "should_apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_apply=false" >> "$GITHUB_OUTPUT"
          fi
          echo "compile_firmware=true" >> "$GITHUB_OUTPUT"
          echo "Decision → patch=$PATCH force=$FORCE"

# ════════════════════════════════════════════════════════════════════
# Job 2: Apply Patch
# ════════════════════════════════════════════════════════════════════
  apply-patch:
    name: Apply Patch
    needs: check
    if: needs.check.outputs.should_apply == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Extract & validate patch
        env:
          PATCH_PATH: ${{ needs.check.outputs.patch_path }}
        run: |
          set -euo pipefail
          echo "Extracting: $PATCH_PATH"
          mkdir -p _patch_tmp
          unzip -o "$PATCH_PATH" -d _patch_tmp

          if find _patch_tmp -type d -name '.github' | grep -q '.'; then
            echo "❌ Patch contains .github/ — aborting for security"
            exit 1
          fi

          rsync -av --exclude='.github' _patch_tmp/ .
          rm -rf _patch_tmp
          echo "✅ Patch extracted"

      - name: Run apply.sh (optional post-patch hook)
        run: |
          if [ -f "zip_update/patches/apply.sh" ]; then
            echo "Running apply.sh..."
            chmod +x zip_update/patches/apply.sh
            bash zip_update/patches/apply.sh
            echo "✅ apply.sh completed"
          else
            echo "No apply.sh found — skipping"
          fi

      - name: Commit patch results
        run: |
          PATCH_NAME=$(basename "${{ needs.check.outputs.patch_path }}" .zip)

          rm -f zip_update/patches/*.zip zip_update/patches/apply.sh

          echo "$PATCH_NAME" >> zip_update/applied_patches.txt
          tail -n 50 zip_update/applied_patches.txt > /tmp/ap.txt \
            && mv /tmp/ap.txt zip_update/applied_patches.txt

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if ! git diff --cached --quiet; then
            NOTE=$(grep -v '^#' zip_update/CHANGELOG.md 2>/dev/null | head -80 || echo "")
            git commit -m "chore: apply patch $PATCH_NAME [skip ci] $NOTE"
            git push origin HEAD
            echo "✅ Committed and pushed"
          else
            echo "No changes to commit after patch"
          fi

# ════════════════════════════════════════════════════════════════════
# Job 3: Build Firmware
# ════════════════════════════════════════════════════════════════════
  build:
    name: Build Firmware
    needs: [check, apply-patch]
    if: |
      always() &&
      needs.check.outputs.compile_firmware == 'true' &&
      (needs.apply-patch.result == 'success' || needs.apply-patch.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code (post-patch)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest (picks up patch commit if any)
        run: git pull --rebase origin ${{ github.ref_name }} || true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install PlatformIO + Python deps
        run: pip install --upgrade pip platformio asn1crypto

      # ── Toolchain cache (correct path, no leading dot) ────────────────────
      - name: Cache PlatformIO toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/python3
          key: pio-toolchain-${{ runner.os }}-espressif8266-3.0.0-v3
          restore-keys: |
            pio-toolchain-${{ runner.os }}-espressif8266-3.0.0-
            pio-toolchain-${{ runner.os }}-

      # ── Library cache (project-local .pio/libdeps) ────────────────────────
      - name: Cache PlatformIO libraries
        id: pio_lib_cache
        uses: actions/cache@v4
        with:
          path: .pio/libdeps
          key: pio-lib-${{ runner.os }}-${{ hashFiles('platformio.ini', 'gui/js/configuration.json', 'gui/js/dashboard.json') }}
          restore-keys: |
            pio-lib-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
            pio-lib-${{ runner.os }}-

      # Single install step — handles both platform + libraries
      - name: Install PlatformIO platform & libraries
        run: pio pkg install --environment d1_mini

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── npm pre-install ───────────────────────────────────────────────────
      # The framework directory is named "ESP8266 IoT Framework" (contains spaces).
      # We must use find -print0 / read -d '' to handle the name correctly —
      # never pipe through xargs dirname which splits on whitespace.
      - name: Install npm deps in framework
        run: |
          set -euo pipefail

          # Locate the framework directory directly (maxdepth 1 = immediate subdir)
          FW_DIR=""
          while IFS= read -r -d '' dir; do
            if [ -f "$dir/package.json" ]; then
              FW_DIR="$dir"
              break
            fi
          done < <(find .pio/libdeps/d1_mini -maxdepth 1 -mindepth 1 -type d -print0 2>/dev/null)

          if [ -z "$FW_DIR" ]; then
            echo "⚠️  No package.json found under .pio/libdeps/d1_mini — skipping npm pre-install"
            echo "    (PlatformIO will run npm ci automatically during build)"
            exit 0
          fi

          echo "Framework found at: $FW_DIR"

          if [ -d "$FW_DIR/node_modules" ]; then
            echo "✅ node_modules already present (cache hit) — skipping npm install"
          else
            echo "📦 Running npm install --legacy-peer-deps"
            cd "$FW_DIR"
            npm install --legacy-peer-deps
            echo "✅ npm install complete"
          fi

      # Cache node_modules so the next run skips npm entirely.
      # Use a stable path glob that survives the space in the dir name.
      - name: Cache framework node_modules
        uses: actions/cache@v4
        with:
          path: .pio/libdeps/d1_mini/ESP8266 IoT Framework/node_modules
          key: npm-fw-${{ runner.os }}-${{ hashFiles('.pio/libdeps/d1_mini/ESP8266 IoT Framework/package.json') }}
          restore-keys: npm-fw-${{ runner.os }}-

      - name: Cache PlatformIO build artifacts
        uses: actions/cache@v4
        with:
          path: .pio/build/d1_mini
          key: pio-build-${{ runner.os }}-${{ hashFiles('src/**', 'platformio.ini', 'gui/js/configuration.json', 'gui/js/dashboard.json') }}
          restore-keys: |
            pio-build-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
            pio-build-${{ runner.os }}-

      - name: Build firmware (d1_mini)
        run: pio run -e d1_mini

      - name: Build filesystem image (LittleFS)
        run: pio run -e d1_mini -t buildfs

      - name: Upload firmware + filesystem artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-d1_mini
          path: |
            .pio/build/d1_mini/firmware.bin
            .pio/build/d1_mini/littlefs.bin
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date +%Y.%m%d.%H%M)"
          BODY=$(grep -v '^#' zip_update/CHANGELOG.md 2>/dev/null \
                 || echo "Automated firmware build")
          gh release create "$TAG" \
            --title "Firmware $TAG" \
            --notes "$BODY" \
            .pio/build/d1_mini/firmware.bin \
            .pio/build/d1_mini/littlefs.bin
          echo "✅ Release $TAG created"

# ════════════════════════════════════════════════════════════════════
# Job 4: Cleanup
# ════════════════════════════════════════════════════════════════════
  cleanup:
    name: Cleanup Old Releases & Runs
    needs: [check, build]
    if: |
      always() &&
      needs.build.result == 'success' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Delete old releases (keep newest 10)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          KEEP:     "10"
        run: |
          echo "── Cleaning up old releases ──────────────────────────────"
          RELEASE_IDS=$(gh api "repos/$REPO/releases" --paginate --jq '.[].id' 2>/dev/null || echo "")
          TOTAL=$(echo "$RELEASE_IDS" | grep -c . 2>/dev/null || echo 0)

          if [ "$TOTAL" -le "$KEEP" ]; then
            echo "Only $TOTAL releases — nothing to delete"
          else
            echo "$RELEASE_IDS" | tail -n "+$((KEEP + 1))" | while read -r rid; do
              [ -z "$rid" ] && continue
              TAG=$(gh api "repos/$REPO/releases/$rid" --jq '.tag_name' 2>/dev/null || echo "")
              gh api --method DELETE "repos/$REPO/releases/$rid" \
                && echo "  ✅ Deleted release $rid (${TAG})" \
                || echo "  ⚠️  Failed to delete release $rid"
              if [ -n "$TAG" ]; then
                gh api --method DELETE "repos/$REPO/git/refs/tags/$TAG" 2>/dev/null \
                  && echo "     🏷️  Deleted tag $TAG"
              fi
            done
          fi

      - name: Delete old workflow runs (keep newest 15)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          KEEP:     "15"
        run: |
          echo "── Cleaning up old workflow runs ─────────────────────────"
          for WF_ID in $(gh api "repos/$REPO/actions/workflows" \
                         --paginate --jq '.workflows[].id' 2>/dev/null); do
            WF_NAME=$(gh api "repos/$REPO/actions/workflows/$WF_ID" \
                      --jq '.name' 2>/dev/null || echo "id=$WF_ID")
            RUN_IDS=$(gh api "repos/$REPO/actions/workflows/$WF_ID/runs" \
                        --paginate --jq '.workflow_runs[].id' 2>/dev/null | head -200)
            TOTAL=$(echo "$RUN_IDS" | grep -c . 2>/dev/null || echo 0)
            [ "$TOTAL" -le "$KEEP" ] && continue
            echo "  Workflow: $WF_NAME — deleting $((TOTAL - KEEP)) old run(s)"
            echo "$RUN_IDS" | tail -n "+$((KEEP + 1))" | while read -r run_id; do
              [ -z "$run_id" ] && continue
              gh api --method DELETE "repos/$REPO/actions/runs/$run_id" 2>/dev/null \
                && echo "    ✅ Deleted run $run_id" \
                || echo "    ⚠️  Failed run $run_id"
            done
          done
          echo "=== Cleanup done ==="

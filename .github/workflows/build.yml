name: Build & Release Firmware

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if no changes'
        required: false
        default: false
        type: boolean

# ════════════════════════════════════════════════════════════════════
# Job 1: Pre-flight Check
# ════════════════════════════════════════════════════════════════════
jobs:
  check:
    name: Pre-flight Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      patch_found:      ${{ steps.find_patch.outputs.patch_found }}
      patch_path:       ${{ steps.find_patch.outputs.patch_path }}
      should_apply:     ${{ steps.decision.outputs.should_apply }}
      compile_firmware: ${{ steps.decision.outputs.compile_firmware }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find latest patch zip
        id: find_patch
        run: |
          ZIP=$(find zip_update/patches -maxdepth 1 -name 'update_*.zip' 2>/dev/null \
                | sort -t_ -k2 -n | tail -n1 || echo "")
          if [ -n "$ZIP" ]; then
            echo "patch_found=true"  >> "$GITHUB_OUTPUT"
            echo "patch_path=$ZIP"   >> "$GITHUB_OUTPUT"
            echo "✅ Found patch: $ZIP"
          else
            echo "patch_found=false" >> "$GITHUB_OUTPUT"
            echo "patch_path="       >> "$GITHUB_OUTPUT"
            echo "ℹ️  No patch found"
          fi

      - name: Decide actions
        id: decision
        run: |
          PATCH="${{ steps.find_patch.outputs.patch_found }}"
          if [ "$PATCH" = "true" ]; then
            echo "should_apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_apply=false" >> "$GITHUB_OUTPUT"
          fi
          echo "compile_firmware=true" >> "$GITHUB_OUTPUT"

# ════════════════════════════════════════════════════════════════════
# Job 2: Apply Patch
# ════════════════════════════════════════════════════════════════════
  apply-patch:
    name: Apply Patch
    needs: check
    if: needs.check.outputs.should_apply == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Extract & validate patch
        env:
          PATCH_PATH: ${{ needs.check.outputs.patch_path }}
        run: |
          set -euo pipefail
          mkdir -p _patch_tmp
          unzip -o "$PATCH_PATH" -d _patch_tmp
          if find _patch_tmp -type d -name '.github' | grep -q '.'; then
            echo "❌ Patch contains .github/ — aborting"; exit 1
          fi
          rsync -av --exclude='.github' _patch_tmp/ .
          rm -rf _patch_tmp
          echo "✅ Patch extracted"

      - name: Run apply.sh (optional)
        run: |
          if [ -f "zip_update/patches/apply.sh" ]; then
            chmod +x zip_update/patches/apply.sh
            bash zip_update/patches/apply.sh
          fi

      - name: Commit patch results
        run: |
          PATCH_NAME=$(basename "${{ needs.check.outputs.patch_path }}" .zip)
          rm -f zip_update/patches/*.zip zip_update/patches/apply.sh
          echo "$PATCH_NAME" >> zip_update/applied_patches.txt
          tail -n 50 zip_update/applied_patches.txt > /tmp/ap.txt && mv /tmp/ap.txt zip_update/applied_patches.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            NOTE=$(grep -v '^#' zip_update/CHANGELOG.md 2>/dev/null | head -80 || echo "")
            git commit -m "chore: apply patch $PATCH_NAME [skip ci] $NOTE"
            git push origin HEAD
            echo "✅ Committed and pushed"
          fi

# ════════════════════════════════════════════════════════════════════
# Job 3: Build Firmware
# ════════════════════════════════════════════════════════════════════
  build:
    name: Build Firmware
    needs: [check, apply-patch]
    if: |
      always() &&
      needs.check.outputs.compile_firmware == 'true' &&
      (needs.apply-patch.result == 'success' || needs.apply-patch.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code (post-patch)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest
        run: git pull --rebase origin ${{ github.ref_name }} || true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-pio6
          restore-keys: pip-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade pip platformio asn1crypto

      # ── Toolchain: keyed on platform version only (very stable) ──────────
      - name: Cache PlatformIO toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-toolchain-${{ runner.os }}-espressif8266-3.0.0-v3
          restore-keys: pio-toolchain-${{ runner.os }}-

      # ── Library downloads: keyed on platformio.ini ────────────────────────
      # Restored before pkg install so git clones are skipped on cache hit.
      - name: Cache PlatformIO library downloads
        id: lib_cache
        uses: actions/cache@v4
        with:
          path: .pio/libdeps
          key: pio-libdeps-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-libdeps-${{ runner.os }}-

      - name: Install PlatformIO platform & libraries
        run: pio pkg install --environment d1_mini

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── npm: framework node_modules ───────────────────────────────────────
      # Dir name "ESP8266 IoT Framework" has spaces — use null-delimiter find.
      - name: Cache framework node_modules
        id: npm_cache
        uses: actions/cache@v4
        with:
          path: .pio/libdeps/d1_mini/ESP8266 IoT Framework/node_modules
          key: npm-fw-${{ runner.os }}-${{ hashFiles('.pio/libdeps/d1_mini/ESP8266 IoT Framework/package.json') }}
          restore-keys: npm-fw-${{ runner.os }}-

      - name: Install npm deps in framework
        if: steps.npm_cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          FW_DIR=""
          while IFS= read -r -d '' dir; do
            if [ -f "$dir/package.json" ]; then FW_DIR="$dir"; break; fi
          done < <(find .pio/libdeps/d1_mini -maxdepth 1 -mindepth 1 -type d -print0 2>/dev/null)

          if [ -z "$FW_DIR" ]; then
            echo "⚠️  Framework package.json not found — PlatformIO will run npm ci during build"
            exit 0
          fi

          echo "📦 npm install in: $FW_DIR"
          cd "$FW_DIR"
          npm install --legacy-peer-deps
          echo "✅ npm install complete"

      # ── Build object cache: keyed on platformio.ini ONLY (not src/**) ─────
      #
      # KEY DESIGN: by NOT including src/** in the cache key, library .o files
      # survive across your source code changes. On a cache hit, PlatformIO still
      # runs but only recompiles files that actually changed — skipping the
      # 60-90 seconds of library compilation (ESP8266SdFat, framework, etc).
      #
      # The cache is only fully invalidated when platformio.ini changes
      # (i.e. you add/remove/upgrade a library).
      - name: Cache PlatformIO build objects
        uses: actions/cache@v4
        with:
          path: .pio/build/d1_mini
          key: pio-build-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-build-${{ runner.os }}-

      - name: Build firmware
        run: pio run -e d1_mini

      # NOTE: no buildfs step — web UI is embedded in PROGMEM (html.h).
      # This project has no data/ directory.

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-d1_mini
          path: .pio/build/d1_mini/firmware.bin
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date +%Y.%m%d.%H%M)"
          BODY=$(grep -v '^#' zip_update/CHANGELOG.md 2>/dev/null || echo "Automated firmware build")
          gh release create "$TAG" \
            --title "Firmware $TAG" \
            --notes "$BODY" \
            .pio/build/d1_mini/firmware.bin
          echo "✅ Release $TAG created"

# ════════════════════════════════════════════════════════════════════
# Job 4: Cleanup
# ════════════════════════════════════════════════════════════════════
  cleanup:
    name: Cleanup Old Releases & Runs
    needs: [check, build]
    if: |
      always() &&
      needs.build.result == 'success' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Delete old releases (keep newest 10)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          KEEP:     "10"
        run: |
          RELEASE_IDS=$(gh api "repos/$REPO/releases" --paginate --jq '.[].id' 2>/dev/null || echo "")
          TOTAL=$(echo "$RELEASE_IDS" | grep -c . 2>/dev/null || echo 0)
          if [ "$TOTAL" -le "$KEEP" ]; then
            echo "Only $TOTAL releases — nothing to delete"
          else
            echo "$RELEASE_IDS" | tail -n "+$((KEEP + 1))" | while read -r rid; do
              [ -z "$rid" ] && continue
              TAG=$(gh api "repos/$REPO/releases/$rid" --jq '.tag_name' 2>/dev/null || echo "")
              gh api --method DELETE "repos/$REPO/releases/$rid" \
                && echo "✅ Deleted release $rid ($TAG)" || true
              [ -n "$TAG" ] && gh api --method DELETE "repos/$REPO/git/refs/tags/$TAG" 2>/dev/null || true
            done
          fi

      - name: Delete old workflow runs (keep newest 15)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          KEEP:     "15"
        run: |
          for WF_ID in $(gh api "repos/$REPO/actions/workflows" --paginate --jq '.workflows[].id' 2>/dev/null); do
            RUN_IDS=$(gh api "repos/$REPO/actions/workflows/$WF_ID/runs" \
                        --paginate --jq '.workflow_runs[].id' 2>/dev/null | head -200)
            TOTAL=$(echo "$RUN_IDS" | grep -c . 2>/dev/null || echo 0)
            [ "$TOTAL" -le "$KEEP" ] && continue
            echo "$RUN_IDS" | tail -n "+$((KEEP + 1))" | while read -r run_id; do
              [ -z "$run_id" ] && continue
              gh api --method DELETE "repos/$REPO/actions/runs/$run_id" 2>/dev/null || true
            done
          done
          echo "=== Cleanup done ==="

; PlatformIO Project Configuration File
; LED Matrix Clock — Wemos D1 Mini (ESP8266)
;
; The esp8266-iot-framework is listed as a lib_dep.
; Its own preBuild.py handles HTML/config/dashboard code generation
; automatically — do NOT add extra_scripts here.

[env:d1_mini]
platform = espressif8266@3.0.0
board = d1_mini
framework = arduino
board_build.f_cpu = 160000000L

monitor_speed = 115200

lib_deps =
    https://github.com/maakbaas/esp8266-iot-framework
    FastLED

; CONFIG_PATH / DASHBOARD_PATH copy the project-local JSON files into
; the framework library before the code-gen scripts run.
; REBUILD_* flags then regenerate config.h / dash.h / html.h from them.
build_flags =
    -DREBUILD_HTML
    -DREBUILD_CONFIG
    -DREBUILD_DASHBOARD
    -DCONFIG_PATH=gui/js/configuration.json
    -DDASHBOARD_PATH=gui/js/dashboard.json

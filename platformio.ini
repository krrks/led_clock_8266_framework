; PlatformIO Project Configuration File
; LED Matrix Clock — Wemos D1 Mini (ESP8266)
;
; ── WS2812B output ──────────────────────────────────────────────────────────
; Switched from FastLED (bit-bang, WiFi-unsafe) to NeoPixelBus DMA (I2S, WiFi-safe).
; Data line MOVED to GPIO3 (RX/D9) — NeoPixelBus DMA hardwires to GPIO3.
; Serial started TX-only in main.cpp so GPIO3 is free for I2S.
; ⚠ Rewire: unsolder D2→matrix, solder RX(D9)→matrix data.
;
; ── Legacy source files ──────────────────────────────────────────────────────
; DisplayManager / ClockFace / InfoColumns / ButtonHandler / StatusLED /
; TimeManager / WeatherService are kept in src/ for reference but excluded
; from compilation (they were never called in active code paths).

[env:d1_mini]
platform = espressif8266@3.0.0
board = d1_mini
framework = arduino
board_build.f_cpu = 160000000L

monitor_speed = 115200

lib_deps =
    https://github.com/maakbaas/esp8266-iot-framework
    makuna/NeoPixelBus@^2.7.0

; Exclude legacy / unused source files
src_filter =
    +<*>
    -<DisplayManager.cpp>
    -<ClockFace.cpp>
    -<InfoColumns.cpp>
    -<ButtonHandler.cpp>
    -<StatusLED.cpp>
    -<TimeManager.cpp>
    -<WeatherService.cpp>

build_flags =
    -DREBUILD_HTML
    -DREBUILD_CONFIG
    -DREBUILD_DASHBOARD
    -DCONFIG_PATH=gui/js/configuration.json
    -DDASHBOARD_PATH=gui/js/dashboard.json

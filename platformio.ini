; PlatformIO Project Configuration File
; LED Matrix Clock — Wemos D1 Mini (ESP8266)
;
; ── WS2812B output ──────────────────────────────────────────────────────────
; NeoPixelBus DMA (I2S, WiFi-safe) on GPIO3 (RX/D9).
; Serial started TX-only so GPIO3 is free for I2S.
; ⚠ Rewire: unsolder D2→matrix, solder RX(D9)→matrix data.
;
; ── Legacy source files ──────────────────────────────────────────────────────
; DisplayManager / ClockFace / InfoColumns / ButtonHandler / StatusLED /
; TimeManager / WeatherService are kept in src/ for reference but excluded
; from compilation.

[env:d1_mini]
platform = espressif8266@3.0.0
board = d1_mini
framework = arduino
board_build.f_cpu = 160000000L

monitor_speed = 115200

lib_deps =
    makuna/NeoPixelBus@^2.7.0
    me-no-dev/ESPAsyncTCP@^2.0.0
    me-no-dev/ESPAsyncWebServer@^3.0.0
    bblanchon/ArduinoJson@^7.0.0

board_build.filesystem = littlefs

src_filter =
    +<*>
    -<DisplayManager.cpp>
    -<ClockFace.cpp>
    -<InfoColumns.cpp>
    -<ButtonHandler.cpp>
    -<StatusLED.cpp>
    -<TimeManager.cpp>
    -<WeatherService.cpp>

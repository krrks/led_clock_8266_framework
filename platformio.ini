; PlatformIO Project Configuration File
; LED Matrix Clock — Wemos D1 Mini (ESP8266)

[env:d1_mini]
platform = espressif8266@3.0.0
board = d1_mini
framework = arduino
board_build.f_cpu = 160000000L

monitor_speed = 115200

lib_deps =
    https://github.com/lorol/ESPAsyncWebServer
    ArduinoJson
    FastLED

; Rebuild HTML bundle, config struct, and dashboard struct from JSON.
; These flags run webpack + code-gen scripts before each CI build.
; Remove REBUILD_HTML locally if you don't have npm installed.
build_flags =
    -DREBUILD_HTML
    -DREBUILD_CONFIG
    -DREBUILD_DASHBOARD

extra_scripts = scripts/preBuild.py
